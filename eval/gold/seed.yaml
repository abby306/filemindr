# Gold query set for the SYNTHETIC demo corpus (scripts/make_demo_corpus.py).
#
# All documents, names, and figures here are fictional. Fact substrings are
# grounded in the demo documents' source text; extraction may phrase an atomic
# fact slightly differently, so after your first `seed_corpus` run treat these
# as a scaffold — verify/adjust substrings against your own `document_facts`
# rows for tight numbers. Slugs token-map onto the demo filenames/titles
# (see scripts/eval_retrieval.py); pin with --doc-map if a mapping misses.
#
# 13 queries across the four intents: aggregate / lexical / metadata / semantic.

# --- aggregate (amounts, totals) --------------------------------------------

- id: acme_invoice_total
  query: "What is the total amount due on the Acme invoice?"
  type: aggregate
  expected_doc_ids: ["acme-web-services-invoice"]
  expected_fact_substrings: ["1840.00"]
  answer_contains: ["1840"]

- id: cafe_receipt_total
  query: "How much did I spend at Blue Fern Cafe?"
  type: aggregate
  expected_doc_ids: ["blue-fern-cafe-receipt"]
  expected_fact_substrings: ["23.75"]
  answer_contains: ["23.75"]

- id: cafe_vat
  query: "What was the VAT on the Blue Fern Cafe receipt?"
  type: aggregate
  expected_doc_ids: ["blue-fern-cafe-receipt"]
  expected_fact_substrings: ["2.85"]
  answer_contains: ["2.85"]

- id: harbor_closing_balance
  query: "What is the closing balance on the Harbor Bank statement?"
  type: aggregate
  expected_doc_ids: ["harbor-bank-statement"]
  expected_fact_substrings: ["12430.19"]
  answer_contains: ["12430.19"]

